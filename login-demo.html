            display: flex; align-items: center; justify-content: center;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); /* Phủ xanh đen lạnh */
            z-index: 1;
        }

        .glass-panel {
            position: relative; z-index: 2;
            width: 380px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); 
            text-align: center;
            color: #ffffff;
        }

        .logo {
            width: 90px; height: 90px;
            margin: 0 auto 20px;
            filter: drop-shadow(0 0 15px rgba(68, 255, 136, 0.5));
        }

        h2 { 
            margin: 0 0 5px; font-size: 22px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 1px;
            color: #44ff88; 
            text-shadow: 0 0 10px rgba(68, 255, 136, 0.5); 
        }
        p { margin: 0 0 35px; font-size: 13px; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px;}

        .input-group { margin-bottom: 25px; text-align: left; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 8px; color: #cbd5e1; font-weight: 600; text-transform: uppercase; }
        .input-group input {
            width: 100%; box-sizing: border-box; padding: 14px 15px;
            background: rgba(0, 0, 0, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px; color: white; font-size: 16px; transition: 0.3s;
        }
        .input-group input:focus {
            outline: none; border-color: #44ff88; background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 12px rgba(68, 255, 136, 0.3);
        }

        .btn-login {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #0284c7, #2563eb); 
            border: none; border-radius: 8px;
            color: white; font-size: 15px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s; margin-top: 10px;
        }
        .btn-login:hover {
            box-shadow: 0 5px 20px rgba(37, 99, 235, 0.6);
            transform: translateY(-2px); 
        }
