# go2rtc.yaml - Cấu hình hỗ trợ AI Overlay
ffmpeg:
  bin: ffmpeg

rtsp:
  listen: ":8554"

streams:
  # Hai luồng này sẽ đợi Module AI đẩy hình có vẽ 10 điểm vào
  camera_152_normal: 
  camera_152_thermal: 

  # Luồng lấy trực tiếp (Tốc độ gốc, không trễ)
  camera_152_direct: rtsp://admin:Ab%4012345@192.168.10.152:554/Streaming/Channels/101
  camera_152_thermal_direct: rtsp://admin:Ab%4012345@192.168.10.152:554/Streaming/Channels/201

  # Luồng MJPEG (Giải pháp siêu mượt, độ trễ 0s cho App Desktop)
  camera_152_normal_mjpeg: "ffmpeg:camera_152_normal#video=mjpeg#width=1280#height=720"
  camera_152_direct_mjpeg: "ffmpeg:camera_152_direct#video=mjpeg#width=1280#height=720"

  # Luồng này vẫn lấy trực tiếp (không cần vẽ)
  camera_153_pd: rtsp://admin:Ab%4012345@192.168.10.153:554/Streaming/Channels/101

api:
  listen: ":1984"
  origin: "*"

log:
  level: info
