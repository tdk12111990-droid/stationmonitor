# go2rtc.yaml - Cấu hình tối ưu cho 10 điểm nhiệt
ffmpeg:
  bin: ffmpeg

rtsp:
  listen: ":8554"

streams:
  # 1. Luồng gốc từ Camera (Dùng làm đầu vào cho bộ xử lý AI/Relay)
  camera_152_normal_src: "rtsp://admin:Demo%402024@192.168.10.152:554/Streaming/Channels/101"
  camera_152_thermal_src: "rtsp://admin:Demo%402024@192.168.10.152:554/Streaming/Channels/201"
  camera_153_pd_src: "rtsp://admin:Demo%402024@192.168.10.153:554/Streaming/Channels/101"

  # 2. Luồng đã vẽ điểm nhiệt (Được bộ Relay đẩy vào)
  # Dashboard sẽ tự động nhận dữ liệu từ đây
  camera_152_normal: []
  camera_152_thermal: []
  camera_153_pd: []

  # 3. Luồng phụ (_sub) cho trang lưới NVR
  camera_152_normal_sub: "rtsp://admin:Demo%402024@192.168.10.152:554/Streaming/Channels/102"
  camera_153_pd_sub: "rtsp://admin:Demo%402024@192.168.10.153:554/Streaming/Channels/102"

api:
  listen: ":1984"
  origin: "*"

log:
  level: info
