<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' * data: blob:;" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <title>Station Monitor - Power System Dashboard</title>
  <meta name="description" content="Internal real-time power station monitoring dashboard." />
  <meta name="theme-color" content="#0a0f0a" />
  <meta name="robots" content="noindex, nofollow" />

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="/favico/logo.svg" />
  <link rel="apple-touch-icon" href="/favico/logo.svg" />

  <!-- Theme -->
  <script>(function () { try { var t = localStorage.getItem('station-monitor-theme'); if (t === 'light') document.documentElement.dataset.theme = 'light'; } catch (e) { } document.documentElement.classList.add('no-transition'); })()</script>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Styles -->
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>

<body>
  <div id="app">
    <div
      style="height: 100vh; background: #0a0a0a; display: flex; align-items: center; justify-content: center; color: #44ff88; font-family: monospace;">
      Loading Station Monitor...
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
