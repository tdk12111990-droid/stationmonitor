syntax = "proto3";

package ai;

option csharp_namespace = "StationMonitor.AI.Protos";

// ============================================================
// StationMonitor AI Service — gRPC Contract
// Cập nhật: 2026-04-07
//
// Python (Jetson): implement server
// .NET (Backend):  gọi như gRPC client
// ============================================================

// ─────────────────────────────────────────
// SERVICE DEFINITION
// ─────────────────────────────────────────
service AiService {

  // ── Inference ──────────────────────────

  // Gửi 1 frame → Python phân tích → trả kết quả ngay (unary)
  rpc Detect (DetectRequest) returns (DetectResponse);

  // Python stream kết quả liên tục về .NET khi camera đang chạy
  rpc StreamDetections (StreamRequest) returns (stream DetectionResult);

  // ── Analytics ──────────────────────────

  // Gửi time-series 30 ngày → Python trả trend + dự báo RUL
  rpc AnalyzeTrend (TrendRequest) returns (TrendResponse);

  // Cross-validate: thermal alert + frame → YOLO kiểm tra có phải động vật không
  rpc CrossValidate (CrossValidateRequest) returns (CrossValidateResponse);

  // ── Model Management ───────────────────

  // Lấy trạng thái Jetson + các model đang chạy
  rpc GetStatus (Empty) returns (StatusResponse);

  // Reload model (sau khi upload model mới)
  rpc ReloadModel (ReloadModelRequest) returns (ReloadModelResponse);
}

// ─────────────────────────────────────────
// COMMON
// ─────────────────────────────────────────
message Empty {}

message BoundingBox {
  float x      = 1;  // pixel từ trái
  float y      = 2;  // pixel từ trên
  float width  = 3;
  float height = 4;
}

// ─────────────────────────────────────────
// DETECT — Phân tích 1 frame
// ─────────────────────────────────────────
message DetectRequest {
  string camera_id  = 1;  // "cam-152"
  bytes  frame_jpeg = 2;  // raw JPEG bytes
  string model_type = 3;  // "intrusion" | "equipment" | "status" | "face"
  int64  timestamp  = 4;  // Unix milliseconds
}

message DetectResponse {
  string              camera_id  = 1;
  repeated Detection  detections = 2;
  int64               latency_ms = 3;  // thời gian inference
  string              model_used = 4;  // "intrusion-v3-trt"
}

message Detection {
  string      label       = 1;  // "snake", "bird_nest", "remote_lock"
  float       confidence  = 2;  // 0.0 – 1.0
  string      type        = 3;  // "animal" | "equipment" | "intrusion" | "status" | "face"
  string      severity    = 4;  // "info" | "warning" | "alarm"
  BoundingBox bbox        = 5;
  string      extra_json  = 6;  // JSON thêm: { "status": "REMOTE", "temp": 87.5 }
}

// ─────────────────────────────────────────
// STREAM DETECTIONS — Kết quả liên tục
// ─────────────────────────────────────────
message StreamRequest {
  string camera_id  = 1;
  string model_type = 2;  // "intrusion" | "equipment" | "all"
  float  min_confidence = 3;  // lọc kết quả < ngưỡng này
}

message DetectionResult {
  string              camera_id  = 1;
  repeated Detection  detections = 2;
  int64               timestamp  = 3;
  int64               frame_no   = 4;
}

// ─────────────────────────────────────────
// ANALYZE TREND — Phân tích time-series
// ─────────────────────────────────────────
message TrendRequest {
  string          device_id  = 1;
  string          point_id   = 2;  // "DB32_0" (Pha A), "DB32_8" (PD)...
  repeated Sample samples    = 3;  // dữ liệu lịch sử (max 30 ngày)
  int32           horizon_days = 4;  // dự báo bao nhiêu ngày tới
  string          analysis_type = 5; // "linear" | "arima" | "lstm"
}

message Sample {
  int64 timestamp = 1;  // Unix milliseconds
  float value     = 2;
}

message TrendResponse {
  string          device_id     = 1;
  string          point_id      = 2;
  float           slope_per_day = 3;  // dương = tăng, âm = giảm
  float           r_squared     = 4;  // độ tin cậy model (0-1)
  string          trend         = 5;  // "rising" | "stable" | "falling"
  repeated Sample predictions   = 6;  // giá trị dự báo từng ngày
  float           days_to_threshold = 7;  // dự báo bao nhiêu ngày đến ngưỡng (-1 = không dự báo được)
  float           threshold_value   = 8;  // ngưỡng dùng để tính days_to_threshold
  string          model_used    = 9;  // "linear" | "ARIMA(2,1,2)" | "LSTM"
  string          warning       = 10; // cảnh báo nếu có (vd: "Xu hướng tăng bất thường")
}

// ─────────────────────────────────────────
// CROSS VALIDATE — Kiểm tra chéo thermal ↔ YOLO
// ─────────────────────────────────────────
message CrossValidateRequest {
  string camera_id    = 1;
  bytes  frame_jpeg   = 2;
  BoundingBox roi     = 3;  // vùng cần kiểm tra (từ thermal alert)
  string trigger_type = 4;  // "thermal" | "pd" | "vca"
  float  trigger_value = 5; // giá trị đo được (ví dụ: 87.5°C)
}

message CrossValidateResponse {
  bool   is_equipment   = 1;  // true = sự cố thiết bị, false = false alarm
  bool   is_animal      = 2;
  bool   is_person      = 3;
  string label          = 4;  // "cat", "snake", "person", "equipment_fault"
  float  confidence     = 5;
  string recommendation = 6;  // "Hủy cảnh báo quá nhiệt — phát hiện mèo nằm sưởi"
  BoundingBox bbox      = 7;
}

// ─────────────────────────────────────────
// STATUS — Trạng thái Jetson
// ─────────────────────────────────────────
message StatusResponse {
  string              status       = 1;  // "running" | "degraded" | "offline"
  repeated ModelInfo  models       = 2;
  repeated CameraFps  camera_fps   = 3;
  float               gpu_usage    = 4;  // %
  float               gpu_temp     = 5;  // °C
  int64               uptime_sec   = 6;
  string              jetpack_ver  = 7;  // "6.0"
}

message ModelInfo {
  string model_id   = 1;  // "intrusion-v3-trt"
  string model_type = 2;  // "intrusion" | "equipment" | "face"
  bool   is_active  = 3;
  float  accuracy   = 4;  // mAP50 từ lúc train
  string format     = 5;  // "tensorrt" | "pytorch"
}

message CameraFps {
  string camera_id     = 1;
  float  inference_fps = 2;
}

// ─────────────────────────────────────────
// RELOAD MODEL
// ─────────────────────────────────────────
message ReloadModelRequest {
  string model_type = 1;  // "intrusion" | "equipment" | "face"
  string model_path = 2;  // path trên Jetson: "/app/models/intrusion-v4.engine"
}

message ReloadModelResponse {
  bool   success = 1;
  string message = 2;
}
