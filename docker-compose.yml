services:
  # 1. Cơ sở dữ liệu: TimescaleDB (PostgreSQL + Time-series)
  stationmonitor-db:
    image: timescale/timescaledb:latest-pg16
    container_name: stationmonitor-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=stationmonitor
    ports:
      - "5432:5432"
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d stationmonitor" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sm-network

  # 2. MQTT Broker: Eclipse Mosquitto ( IoT communication )
  stationmonitor-mqtt:
    image: eclipse-mosquitto:latest
    container_name: stationmonitor-mqtt
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./data/mosquitto/config:/mosquitto/config
      - ./data/mosquitto/data:/mosquitto/data
      - ./data/mosquitto/log:/mosquitto/log
    networks:
      - sm-network

  # 3. Video Streaming: go2rtc ( RTSP -> Web )
  stationmonitor-streaming:
    image: alexxit/go2rtc:latest
    container_name: stationmonitor-streaming
    restart: always
    ports:
      - "1984:1984" # HTTP API / WebRTC UI
      - "8554:8554" # RTSP re-stream
      - "8555:8555/tcp"
      - "8555:8555/udp"
    volumes:
      - ./media-server/go2rtc.yaml:/config/go2rtc.yaml
    networks:
      - sm-network

  # 4. Backend chính: StationMonitor ASP.NET Core API
  stationmonitor-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stationmonitor-backend
    restart: always
    depends_on:
      stationmonitor-db:
        condition: service_healthy
      stationmonitor-mqtt:
        condition: service_started
      stationmonitor-streaming:
        condition: service_started
    ports:
      - "5056:8080" # Map 5056 (host) sang 8080 (container)
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - "ConnectionStrings__Default=Host=stationmonitor-db;Port=5432;Database=stationmonitor;Username=postgres;Password=postgres123"
      - "Mqtt__Broker=stationmonitor-mqtt"
      - "Jwt__Key=StationMonitor_SuperSecret_Key_2026_ChangeInProduction!"
      - "Go2Rtc__ApiUrl=http://stationmonitor-streaming:1984"
      - "Go2Rtc__RtspUrl=rtsp://stationmonitor-streaming:8554"
      - "Media__FFmpegPath=ffmpeg"
      - "Security__TrustedNetworks=172.,100.,::ffff:172.,::ffff:192.168."
    volumes:
      - ./data/media:/app/wwwroot/media # Thư mục chung cho ảnh/video
    networks:
      - sm-network

  # 5. AI Engine: Xử lý nhiệt độ & hình ảnh (CPU Mode)
  stationmonitor-ai:
    build:
      context: ./sdk-relay
      dockerfile: Dockerfile
    container_name: stationmonitor-ai
    restart: always
    environment:
      - CAMERA_IP=192.168.10.152
      - CAMERA_USER=admin
      - CAMERA_PASSWORD=Demo@2024
      - API_URL=http://stationmonitor-backend:8080/api/v1
      - GO2RTC_RTSP_URL=rtsp://stationmonitor-streaming:8554
      - WWWROOT_PATH=/app/data/media
    volumes:
      - ./data/media:/app/wwwroot/media # Chia sẻ thư mục media với backend
      - ./sdk-relay:/app # [MỚI THÊM] Map thẳng mã nguồn bên ngoài vào Docker để không cần Build lại khi sửa code
    depends_on:
      - stationmonitor-backend
    networks:
      - sm-network

networks:
  sm-network:
    name: stationmonitor-network
    driver: bridge
